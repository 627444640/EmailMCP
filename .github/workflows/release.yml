name: Release desktop packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        default: "0.1.0"
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  GO_VERSION: "1.25.x"
  RELEASE_VERSION: ${{ inputs.version }}

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Set release version
        working-directory: apps/desktop
        shell: node {0}
        run: |
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;
          for (const file of ["package.json", "src-tauri/tauri.conf.json"]) {
            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            data.version = version;
            fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          }
          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          fs.writeFileSync(
            "src-tauri/Cargo.toml",
            cargoToml.replace(/^version = ".*"$/m, `version = "${version}"`)
          );

      - name: Run Go tests
        run: go test -count=1 ./...

      - name: Build Windows package
        working-directory: apps/desktop
        run: npm run tauri:build

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Copy-Item -Path apps/desktop/src-tauri/target/release/bundle/nsis/*.exe -Destination release-artifacts

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: email-mcp-windows
          path: release-artifacts/*
          if-no-files-found: error

  build-macos:
    name: Build macOS package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Set release version
        working-directory: apps/desktop
        shell: node {0}
        run: |
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;
          for (const file of ["package.json", "src-tauri/tauri.conf.json"]) {
            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            data.version = version;
            fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          }
          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          fs.writeFileSync(
            "src-tauri/Cargo.toml",
            cargoToml.replace(/^version = ".*"$/m, `version = "${version}"`)
          );

      - name: Run Go tests
        run: go test -count=1 ./...

      - name: Build macOS package
        working-directory: apps/desktop
        run: npm run tauri:build

      - name: Collect macOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg release-artifacts/
          app_path="$(find apps/desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -n "$app_path" ]; then
            ditto -c -k --keepParent "$app_path" "release-artifacts/Email_MCP_${RELEASE_VERSION}_macos_app.zip"
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: email-mcp-macos
          path: release-artifacts/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: email-mcp-*
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: ls -la release-artifacts

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: v${{ inputs.version }}
          RELEASE_TITLE: Email MCP v${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          cat > release-notes.md <<'NOTES'
          Internal unsigned desktop build for Email MCP.

          - Windows: use the NSIS setup executable.
          - macOS: use the dmg or zipped app.
          - First-run warnings are expected until code signing and notarization are configured.
          NOTES

          create_args=(
            "$TAG_NAME"
            release-artifacts/*
            --title "$RELEASE_TITLE"
            --notes-file release-notes.md
            --target "$GITHUB_SHA"
          )

          if [ "$PRERELEASE" = "true" ]; then
            create_args+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-artifacts/* --clobber
            gh release edit "$TAG_NAME" --title "$RELEASE_TITLE" --notes-file release-notes.md
          else
            gh release create "${create_args[@]}"
          fi
